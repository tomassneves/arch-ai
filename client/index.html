<!doctype html><html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>AI-Arch</title><style>
#loading-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:#ffffff;display:flex;align-items:center;justify-content:center;z-index:9999;opacity:1;transition:opacity .5s ease-out}
#loading-screen.hidden{opacity:0;pointer-events:none}
.loading-spinner{width:40px;height:40px;border:3px solid #e9e9e9;border-top:3px solid #40414F;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
</style></head><body><div id="loading-screen"><div class="loading-spinner"></div></div><div id="menubar"><div class="menu-group"><button id="file-menu" class="menu-btn">File</button><div id="file-dropdown" class="menu-dropdown" style="display: none;"><button id="menu-save" class="menu-item">Save</button><button id="menu-import" class="menu-item">Import</button><button id="menu-export" class="menu-item">Export</button></div></div></div><div id="toolbar"><button id="tool-select" data-tooltip="Select (Space)" class="tool-btn"><svg viewBox="0 0 24 24" width="18" height="18" fill="#40414F" xmlns="http://www.w3.org/2000/svg"><path d="M3 3L10 21L12.5 14.5L19 12L3 3Z"/></svg></button><button id="tool-move" data-tooltip="Move (M)" class="tool-btn"><svg viewBox="0 0 24 24" width="18" height="18" stroke="#40414F" fill="none" stroke-width="2" xmlns="http://www.w3.org/2000/svg"><path d="M12 2V22"/><path d="M2 12H22"/><path d="M12 2L9 5M12 2L15 5"/><path d="M12 22L9 19M12 22L15 19"/><path d="M2 12L5 9M2 12L5 15"/><path d="M22 12L19 9M22 12L19 15"/></svg></button><button id="tool-rotate" data-tooltip="Rotate (R)" class="tool-btn"><svg viewBox="0 0 24 24" width="18" height="18" stroke="#40414F" fill="none" stroke-width="2" xmlns="http://www.w3.org/2000/svg"><path d="M21 12A9 9 0 1 1 12 3"/><path d="M21 3V9H15"/></svg></button><button id="tool-scale" data-tooltip="Scale (S)" class="tool-btn"><svg viewBox="0 0 24 24" width="18" height="18" stroke="#40414F" fill="none" stroke-width="2" xmlns="http://www.w3.org/2000/svg"><rect x="4" y="4" width="16" height="16"/><path d="M14 10L20 4"/><path d="M17 4H20V7"/></svg></button></div><input type="file" id="import-file" style="display: none;" accept=".glb,.gltf" /><div id="app"></div><div id="chat-notification" style="display: none;"><div id="chat-notification-content"><div class="notification-spinner"></div><div id="chat-notification-text">Processing...</div></div></div><div id="chatbox-container"><div id="chatbox"><button id="btn-add" class="icon-btn">+</button><input type="text" id="user-input" placeholder="Build anything..." /></div></div><div id="chat-history-panel"><div id="chat-history-content"></div></div><div id="feedback-panel" style="display: none;"><div id="feedback-content"><p id="feedback-prompt">How can I improve this <strong id="feedback-object-name"></strong>?</p><input type="text" id="feedback-input" placeholder="E.g.: missing towers, bridge too small..." /><div id="feedback-buttons"><button id="btn-submit-feedback" class="primary">Improve</button><button id="btn-cancel-feedback">Close</button></div></div></div><script type="module">import { bootstrap } from './src/app/bootstrap.js'; import { Engine } from './src/engine/engine.js'; window.addEventListener('load', () => { const app = document.getElementById('app'); const engine = new Engine(app); window.engine = engine; bootstrap(engine); setTimeout(() => { document.getElementById('loading-screen').classList.add('hidden'); }, 500); });</script><script type="module" src="/src/engine/main.js"></script></body></html>
