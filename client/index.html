<!doctype html><html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>AI-Arch</title></head><body><div id="menubar"><div class="menu-group"><button id="file-menu" class="menu-btn">File</button><div id="file-dropdown" class="menu-dropdown" style="display: none;"><button id="menu-save" class="menu-item">Save</button><button id="menu-import" class="menu-item">Import</button><button id="menu-export" class="menu-item">Export</button></div></div></div><div id="toolbar"><button id="tool-select" data-tip="Select (Esc)">Select</button><button id="tool-move" data-tip="Move (M)">Move</button><button id="tool-rotate" data-tip="Rotate (R)">Rotate</button><button id="tool-scale" data-tip="Scale (S)">Scale</button><div class="sep"></div><button id="btn-new" data-tip="New (N)">New</button></div><input type="file" id="import-file" style="display: none;" accept=".glb,.gltf" /><div id="app"></div><div id="chat-notification" style="display: none;"><div id="chat-notification-content"><div class="notification-spinner"></div><div id="chat-notification-text">Processing...</div></div></div><div id="chatbox-container"><div id="chatbox"><button id="btn-add" class="icon-btn">+</button><input type="text" id="user-input" placeholder="Build anything..." /></div></div><div id="chat-history-panel"><div id="chat-history-content"></div></div><div id="feedback-panel" style="display: none;"><div id="feedback-content"><p id="feedback-prompt">How can I improve this <strong id="feedback-object-name"></strong>?</p><input type="text" id="feedback-input" placeholder="E.g.: missing towers, bridge too small..." /><div id="feedback-buttons"><button id="btn-submit-feedback" class="primary">Improve</button><button id="btn-cancel-feedback">Close</button></div></div></div><script type="module" src="/src/engine/main.js"></script></body></html>
