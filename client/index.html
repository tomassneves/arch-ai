<!doctype html><html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Archai</title>
<script>
// Alt+S to save project
(function() {
  var saved = false;
  
  function doSave() {
    if (saved) return;
    saved = true;
    setTimeout(function() { saved = false; }, 500);
    if (window.engine && window.engine.saveProject) {
      window.engine.saveProject();
    }
  }
  
  document.addEventListener('keydown', function(e) {
    // Check for Alt+S
    if (e.altKey && !e.ctrlKey && !e.metaKey && !e.shiftKey) {
      var isS = e.key === 's' || e.key === 'S' || e.code === 'KeyS' || e.keyCode === 83;
      if (isS) {
        e.preventDefault();
        e.stopPropagation();
        doSave();
        return false;
      }
    }
  }, true);
})();
</script>
